name: smart_utility_toolkit
description: A Smart Utility Toolkit mobile application containing a Unit Converter, Notes tool, and BMI Calculator.

publish_to: "none"

version: 1.0.0+1

environment:
  sdk: ">=3.2.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  lottie: ^3.1.0
  solar_icons: ^0.0.5

  # Local storage for notes persistence
  shared_preferences: ^2.2.2

  # Cupertino icons for iOS style icons if needed
  cupertino_icons: ^1.0.6

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^3.0.1

flutter:
  uses-material-design: true

  assets:
    - assets/animations/
